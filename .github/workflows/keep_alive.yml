name: Keep Alive
on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch:      # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        # Replace the URL below with your actual Render app URL
        run: curl -s https://your-app.onrender.com/health || echo "Server is waking up..."
