name: LinkedIn AI Automation

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 9 AM
  workflow_dispatch:

jobs:
  post-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Automation
        run: python main.py
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
          BUFFER_CHANNELS: ${{ secrets.BUFFER_CHANNELS }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          ENABLE_X_API: ${{ secrets.ENABLE_X_API }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Email newsletter
          EMAIL_DRIVER: ${{ secrets.EMAIL_DRIVER }}
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # SMTP fallback (only needed if EMAIL_DRIVER=smtp)
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}